name: Deploy
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  id-token: write
  contents: read
env:
  IMAGE_NAME: calvera-backend
jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout to repository
        uses: actions/checkout@v4

      - name: Run Build
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          architecture: x64
          cache: maven

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Azure Registry Login
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build And Push Docker Image
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/$IMAGE_NAME:${{ github.sha }}"
          LATEST_IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/$IMAGE_NAME:latest"
          
          docker build -t "$IMAGE" -t "$LATEST_IMAGE" .
          docker push "$IMAGE"
          docker push "$LATEST_IMAGE"
      - name: Deploy to Web Apps
        uses: azure/webapps-deploy@v3
        with:
          app-name: calvera
          images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
