spring:
  application:
    name: calvera
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/calvera}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  modulith:
    events:
      jdbc:
        schema-initialization:
          enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
            - user
            - repo
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  ai:
    openai:
      api-key: ${LLM_API_KEY}
      base-url: ${LLM_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-4o-mini
          max-completion-tokens: 16384
      embedding:
        options:
          model: text-embedding-3-small
jwt:
  secret-key: ${JWT_SECRET_KEY}

github:
  token: ${GITHUB_TOKEN}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
