spring:
  application:
    name: calvera
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/calvera}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - repo
              - user
jwt:
  secret-key: ${JWT_SECRET_KEY}