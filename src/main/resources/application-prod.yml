spring:
  application:
    name: calvera
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/calvera}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - user
              - repo
  threads:
    virtual:
      enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  ai:
    openai:
      api-key: ${LLM_API_KEY}
      base-url: ${LLM_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: gpt-5-nano
          max-completion-tokens: 1024
jwt:
  secret-key: ${JWT_SECRET_KEY}

github:
  token: ${GITHUB_TOKEN}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
